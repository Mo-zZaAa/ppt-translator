name: Release Skill

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Package skill
        run: python package_skill.py

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v0.1.${{ steps.sha.outputs.short }}"
          name: "ppt-translator ${{ steps.sha.outputs.short }}"
          files: ppt-translator.skill
          body: |
            Korean→English PPT translator using Upstage Solar mini.

            **Install:** Download `ppt-translator.skill`, unzip, run `pip install python-pptx requests`

            **Usage:**
            ```bash
            python scripts/translate_pptx.py input.pptx --api-key YOUR_UPSTAGE_KEY
            ```
